image:
- Visual Studio 2022
environment:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
build_script:
- appveyor DownloadFile https://dot.net/v1/dotnet-install.ps1
- pwsh: ./dotnet-install.ps1 -JSonFile global.json -Architecture x64 -InstallDir 'C:\Program Files\dotnet'
- dotnet build src --configuration Release
- dotnet build IntegrationTests --configuration Release
- src\StrongIdAnalyzer.Tests\bin\Release\net10.0\StrongIdAnalyzer.Tests.exe --report-trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output TestResults\unit.cobertura.xml
- IntegrationTests\IntegrationTests\bin\Release\net10.0\IntegrationTests.exe --report-trx --results-directory TestResults --coverage --coverage-output-format cobertura --coverage-output TestResults\integration.cobertura.xml
on_finish:
- ps: |
    Get-ChildItem TestResults\*.trx -ErrorAction SilentlyContinue | % {
      (New-Object 'System.Net.WebClient').UploadFile("https://ci.appveyor.com/api/testresults/mstest/$($env:APPVEYOR_JOB_ID)", $_.FullName)
    }
    Get-ChildItem TestResults\*.cobertura.xml -ErrorAction SilentlyContinue | % { Push-AppveyorArtifact $_.FullName -FileName $_.Name }
on_failure:
- ps: Get-ChildItem *.received.* -recurse | % { Push-AppveyorArtifact $_.FullName -FileName $_.Name }
test: off
artifacts:
- path: nugets\*.nupkg
- path: TestResults\*.cobertura.xml
